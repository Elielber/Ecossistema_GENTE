<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DAE · Diagrama de Arquitetura de Ecossistemas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 1rem;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 1.5rem;
        }
        .side-panel {
            flex: 1.2;
            min-width: 320px;
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .panel-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn.active {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 4px 10px rgba(139,92,246,0.3);
        }
        .panel-content { display: none; }
        .panel-content.active { display: block; }
        .form-group { margin-bottom: 0.8rem; }
        label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #334155; display: block; margin-bottom: 0.2rem; }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.6rem;
            font-size: 0.85rem;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-1px); filter: brightness(0.95); }
        button.secondary { background: #3b82f6; }
        .rel-list { background: #f8fafc; border-radius: 0.6rem; padding: 0.5rem; list-style: none; font-size: 0.8rem; max-height: 100px; overflow-y: auto; }
        .element-list { max-height: 280px; overflow-y: auto; margin: 1rem 0; display: flex; flex-direction: column; gap: 0.6rem; }
        .element-card { background: #f8fafc; border-radius: 1rem; padding: 0.6rem; border-left: 4px solid; transition: 0.1s; }
        .json-output { background: #0f172a; color: #a5f3fc; padding: 0.6rem; border-radius: 0.8rem; font-family: monospace; font-size: 0.7rem; white-space: pre-wrap; max-height: 180px; overflow: auto; }
        .diagram-area {
            flex: 3;
            min-width: 500px;
            background: #ffffff;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            padding: 1rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .diagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .diagram-title {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
        .filter-btn { background: #e2e8f0; color: #1e293b; padding: 0.2rem 0.8rem; font-size: 0.7rem; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: #8b5cf6; color: white; }
        #network {
            width: 100%;
            height: 65vh;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            background: #fefefe;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.65rem;
            background: #f8fafc;
            padding: 0.5rem;
            border-radius: 2rem;
        }
        .detail-card {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-left: 4px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .detail-card h4 { font-size: 0.8rem; text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; color: #334155; }
        hr { margin: 0.8rem 0; }
        .layer-marker {
            position: absolute;
            top: 10px;
            font-size: 11px;
            font-weight: bold;
            color: #334155;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.03);
            backdrop-filter: blur(2px);
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            border: 1px dashed #cbd5e1;
        }
        @media (max-width: 900px) { .dashboard { flex-direction: column; } #network { height: 50vh; } .layer-marker { font-size: 8px; top: 5px; } }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="side-panel">
        <div class="panel-tabs">
            <button id="tabEditorBtn" class="tab-btn active">✏️ Editor</button>
            <button id="tabVisualizacaoBtn" class="tab-btn">👁️ Visualização</button>
        </div>
        <div id="editorPanel" class="panel-content active">
            <div class="form-group"><label>🏷️ Nome do Ecossistema</label><input type="text" id="nomeEcossistema" placeholder="Ex: ASTIA - Educação"></div>
            <hr>
            <div style="background:#f1f5f9; border-radius:1rem; padding:0.8rem; margin-bottom:1rem;">
                <h4>➕ Adicionar/Editar Elemento</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;">
                    <div><label>ID (único)</label><input type="text" id="elemId" placeholder="ex: gestor"></div>
                    <div><label>Nome</label><input type="text" id="elemNome" placeholder="Gestor"></div>
                    <div><label>Tipo</label><select id="elemTipo">
                        <option value="ator">Ator</option>
                        <option value="servico">Serviço</option>
                        <option value="armazenamento">Armazenamento</option>
                        <option value="touchpoint">Touchpoint</option>
                        <option value="fator_externo">Fator Externo</option>
                        <option value="feedback_loop">Feedback Loop</option>
                        <option value="tarefa">Tarefa / Processo</option>
                        <option value="decisao">Decisão (Gateway)</option>
                    </select></div>
                    <div><label>Camada</label><select id="elemCamada">
                        <option value="frontstage">Frontstage</option>
                        <option value="backstage">Backstage</option>
                        <option value="none">Nenhuma</option>
                    </select></div>
                </div>
                <div class="form-group"><label>Competências</label><textarea id="elemComp" rows="2"></textarea></div>
                <div class="form-group"><label>Valor Agregado</label><textarea id="elemValor" rows="2"></textarea></div>
                
                <div class="form-group">
                    <label>Relacionamentos</label>
                    <div style="display:flex; gap:0.3rem;"><input type="text" id="relDestino" placeholder="ID destino" style="flex:2;">
                    <button id="ativarModoCliqueBtn" style="background:#f97316; font-size:0.7rem; margin-top:0.3rem;">🔘 Destino</button>
                    <select id="relTipo" style="flex:1;">
                        <option>Autenticação</option>
                        <option>Leitura</option>
                        <option>Gravação</option>
                        <option>Leitura+Gravação</option>
                        <option>Fluxo de Valor (dados)</option>
                        <option>Fluxo de Valor (financeiro)</option>
                        <option>Feedback (melhoria)</option>
                        <option>Regulamentação</option>
                        <option>Interação direta</option>
                        <option>Dependência</option>
                    </select>
                    <button id="addRelBtn">➕</button>
                    </div>
                    <ul id="relList" class="rel-list"></ul>
                </div>
                <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.5rem;">
                    <button id="saveElemBtn" class="secondary">💾 Salvar</button>
                    <button id="cancelEditBtn">✖️ Cancelar</button>
                </div>
            </div>
            <h4>📋 Elementos</h4>
            <div id="elementList" class="element-list"></div>
            <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem; flex-wrap: wrap;">
                <button id="exportJsonBtn" style="background:#10b981;">📤 Exportar JSON</button>
                <button id="importJsonBtn" class="secondary">📂 Importar JSON</button>
                <input type="file" id="importFile" accept=".json" style="display:none;">
                
                <button id="exportXmlBtn" style="background:#8b5cf6;">📤 Exportar XMI (UML)</button>
                <button id="importXmlBtn" class="secondary" style="background:#64748b;">📂 Importar XML</button>
                <input type="file" id="importXmlFile" accept=".xml,.xmi" style="display:none;">
				<button id="gerarBpmnBtn" class="btn" style="background:#3b82f6; color: white;">
				<span class="material-icons-round">view_timeline</span> Exportar Diagrama de Raias
				</button>
            </div>

            <div class="json-output" id="jsonOutput"></div>
        </div>
        <div id="visualizacaoPanel" class="panel-content">
            <div id="dynamicDetails">Selecione um elemento no diagrama.</div>
        </div>
    </div>
    <div class="diagram-area">
        <div class="diagram-header">
            <div class="diagram-title" id="diagramTitle">🌐 DAE</div>
            <div class="filters" id="filterContainer">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="frontstage">Frontstage</button>
                <button class="filter-btn" data-filter="backstage">Backstage</button>
                <button id="togglePhysicsBtn" class="filter-btn" style="background:#10b981;">🔒 Travar</button>
                <button id="btnAgruparCamada" class="filter-btn" style="background:#f59e0b; color:white;">📦 Agrupar</button>
                <button id="btnDesagrupar" class="filter-btn" style="display:none; background:#ef4444; color:white;">Desagrupar</button>
            </div>
        </div>
        <div id="network"></div>
        <div class="legend" id="legend"></div>
    </div>
</div>
<script>
    // ==================== DADOS GLOBAIS ====================
    let elementos = [];
    let editandoIndex = null;
    let relacoesTemp = [];
    let network = null;
    let currentFilter = 'all';
    let currentSelectedId = null;
    let modoEdicaoRelacionamento = false;
    let physicsEnabled = true; 
    
    function getConnectedIdsFromText(elemento) {
        const ids = new Set();
        const text = `${elemento.fluxo || ''} ${(elemento.relacionamentos || []).map(r => r.com).join(' ')}`.toLowerCase();
        elementos.forEach(el => {
            if (text.includes(el.id.toLowerCase())) {
                ids.add(el.id);
            }
        });
        return ids;
    }

    // Mapeamentos visuais
    const tipoIcone = { 
        ator: '👤', servico: '⚙️', armazenamento: '🗄️', touchpoint: '📱', 
        fator_externo: '🌍', feedback_loop: '🔄', tarefa: '✅' , decisao: '🔀'
    };
    const tipoCor = { 
        ator: '#3b82f6', servico: '#10b981', armazenamento: '#f59e0b', touchpoint: '#f97316', 
        fator_externo: '#6b7280', feedback_loop: '#ec489a', tarefa: '#f8fafc' , decisao: '#fef08a' 
    };
    const tipoBorda = {
        tarefa: '#64748b',
        decisao: '#ca8a04' 
    };
    const relTipoCor = { 
        "Autenticação": "#c084fc", "Leitura": "#3b82f6", "Gravação": "#f59e0b", 
        "Leitura+Gravação": "#10b981", "Fluxo de Valor (dados)": "#14b8a6", 
        "Fluxo de Valor (financeiro)": "#f43f5e", "Feedback (melhoria)": "#ec489a", 
        "Regulamentação": "#94a3b8", "Interação direta": "#a855f7", "Dependência": "#ef4444"
    };
    const relTipoLabel = { 
        "Autenticação": "Autenticação", "Leitura": "Leitura", "Gravação": "Gravação", 
        "Leitura+Gravação": "Leitura+Gravação", "Fluxo de Valor (dados)": "Fluxo de Dados", 
        "Fluxo de Valor (financeiro)": "Fluxo Financeiro", "Feedback (melhoria)": "Feedback", 
        "Regulamentação": "Regulamentação", "Interação direta": "Interação" 
    };

    // Templates
    const templatesPorTipo = {
        ator: { competencia: "Papel e responsabilidades do ator.", valor: "Valor que este ator agrega ao ecossistema." },
        servico: { competencia: "Função técnica, APIs, capacidade.", valor: "Valor funcional e de negócio." },
        armazenamento: { competencia: "Persistência, estrutura de dados.", valor: "Disponibilidade e integridade." },
        touchpoint: { competencia: "Canal de interação com o usuário.", valor: "Experiência do usuário." },
        fator_externo: { competencia: "Elemento fora do controle direto.", valor: "Influencia estratégia." },
        feedback_loop: { competencia: "Ciclo de melhoria contínua.", valor: "Aprendizado e adaptação." },
        tarefa: { competencia: "Ação ou passo executado no processo.", valor: "Transformação ou avanço no fluxo de trabalho." },
        decisao: { competencia: "Critério lógico ou regra de negócio condicional.", valor: "Garante o roteamento adequado do fluxo de informações ou processos." 
    }
    };

    function preencherTemplate() {
        const tipo = document.getElementById('elemTipo').value;
        const tpl = templatesPorTipo[tipo] || {};
        document.getElementById('elemComp').value = tpl.competencia || '';
        document.getElementById('elemValor').value = tpl.valor || '';
    }

    // ==================== AUXILIARES UI ====================
    function atualizarListaElementos() {
        const container = document.getElementById('elementList');
        container.innerHTML = '';
        elementos.forEach((el, idx) => {
            const card = document.createElement('div');
            card.className = 'element-card';
            card.style.borderLeftColor = tipoCor[el.tipo] || '#8b5cf6';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${el.nome}</strong> <span class="badge" style="background:#e2e8f0; border-radius:12px; padding:0 6px; font-size:0.7rem;">${el.tipo}</span>
                    <div><button class="editElemBtn" data-idx="${idx}" style="background:#3b82f6; padding:0.1rem 0.5rem;">✏️</button>
                    <button class="deleteElemBtn" data-idx="${idx}" style="background:#ef4444; padding:0.1rem 0.5rem;">🗑️</button></div>
                </div>
                <div style="font-size:0.75rem;">${el.competencia?.substring(0,80)}</div>
                <div style="font-size:0.7rem;">Rel: ${(el.relacionamentos || []).map(r => `${r.com} (${r.tipo})`).join(', ')}</div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.editElemBtn').forEach(btn => {
            btn.addEventListener('click', () => carregarParaEdicao(parseInt(btn.getAttribute('data-idx'))));
        });
        document.querySelectorAll('.deleteElemBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                elementos.splice(parseInt(btn.getAttribute('data-idx')), 1);
                atualizarListaElementos();
                gerarJSONPreview();
                renderizarDiagrama();
            });
        });
    }

    function atualizarListaRelacoes() {
        const ul = document.getElementById('relList');
        ul.innerHTML = '';
        relacoesTemp.forEach((rel, idx) => {
            const li = document.createElement('li');
            li.style.display = 'flex'; li.style.justifyContent = 'space-between'; li.style.marginBottom = '4px';
            li.innerHTML = `<span>${rel.com} → ${rel.tipo}</span> <button class="removeRelBtn" data-idx="${idx}" style="background:transparent; color:#ef4444;">❌</button>`;
            ul.appendChild(li);
        });
        document.querySelectorAll('.removeRelBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                relacoesTemp.splice(parseInt(btn.getAttribute('data-idx')), 1);
                atualizarListaRelacoes();
            });
        });
    }

    function carregarParaEdicao(idx) {
        const el = elementos[idx];
        editandoIndex = idx;
        document.getElementById('elemId').value = el.id;
        document.getElementById('elemNome').value = el.nome;
        document.getElementById('elemTipo').value = el.tipo;
        document.getElementById('elemCamada').value = el.camada || 'frontstage';
        document.getElementById('elemComp').value = el.competencia || '';
        document.getElementById('elemValor').value = el.valor || '';
        
        relacoesTemp = [...(el.relacionamentos || [])];
        (el.dependencias || []).forEach(dep => {
            relacoesTemp.push({ com: dep, tipo: 'Dependência' });
        });
        atualizarListaRelacoes();
    }

    function salvarElemento() {
        const id = document.getElementById('elemId').value.trim();
        const nome = document.getElementById('elemNome').value.trim();
        if (!id || !nome) { alert("ID e Nome obrigatórios."); return; }

        const relacionamentosFinais = relacoesTemp.filter(r => r.tipo !== 'Dependência');
        const dependenciasFinais = relacoesTemp.filter(r => r.tipo === 'Dependência').map(r => r.com);
        const fluxoCalculado = relacionamentosFinais.map(r => `→ ${r.com} (${r.tipo})`).join(' | ');

        const novoElemento = { 
            id, nome, 
            tipo: document.getElementById('elemTipo').value, 
            camada: document.getElementById('elemCamada').value, 
            competencia: document.getElementById('elemComp').value.trim(), 
            valor: document.getElementById('elemValor').value.trim(), 
            fluxo: fluxoCalculado, 
            dependencias: dependenciasFinais, 
            relacionamentos: relacionamentosFinais 
        };

        if (editandoIndex !== null) elementos[editandoIndex] = novoElemento;
        else elementos.push(novoElemento);
        
        limparFormulario();
        atualizarListaElementos();
        gerarJSONPreview();
        renderizarDiagrama();
        if (currentSelectedId === id) mostrarDetalhes(id);
    }

    function limparFormulario() {
        document.getElementById('elemId').value = '';
        document.getElementById('elemNome').value = '';
        document.getElementById('elemTipo').value = 'ator';
        document.getElementById('elemCamada').value = 'frontstage';
        document.getElementById('elemComp').value = '';
        document.getElementById('elemValor').value = '';
        relacoesTemp = [];
        atualizarListaRelacoes();
        editandoIndex = null;
        preencherTemplate();
    }

    function gerarJSONPreview() {
        const nomeEcossistema = document.getElementById('nomeEcossistema').value.trim();
        const dadosCompletos = { nome_ecossistema: nomeEcossistema, elementos: elementos };
        document.getElementById('jsonOutput').innerText = JSON.stringify(dadosCompletos, null, 2);
    }

    function exportarJSON() {
        const nomeEcossistema = document.getElementById('nomeEcossistema').value.trim() || "Ecossistema";
        const positions = {};
        if (network) {
            const nodePositions = network.getPositions();
            Object.keys(nodePositions).forEach(id => { positions[id] = { x: nodePositions[id].x, y: nodePositions[id].y }; });
        }
        const dadosCompletos = { nome_ecossistema: nomeEcossistema, elementos: elementos, positions: positions };
        const jsonStr = JSON.stringify(dadosCompletos, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const nomeArquivo = nomeEcossistema.replace(/[^a-z0-9]/gi, '_').toLowerCase() + ".json";
        const a = document.createElement('a');
        a.href = url;
        a.download = nomeArquivo;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url); 
    }

    function importarJSON(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            let dados;
            try {
                dados = JSON.parse(e.target.result);
            } catch (erroParse) {
                alert("Arquivo inválido. O documento corrompeu as normas de um arquivo JSON.");
                return;
            }
            try {
                if (Array.isArray(dados)) {
                    elementos = dados;
                    document.getElementById('nomeEcossistema').value = "";
                } else {
                    document.getElementById('nomeEcossistema').value = dados.nome_ecossistema || "";
                    elementos = dados.elementos || [];
                    window.savedPositions = dados.positions || {};
                }
                atualizarListaElementos();
                gerarJSONPreview();
                renderizarDiagrama();
                if (elementos.length) mostrarDetalhes(elementos[0].id);
                alert("Importado com sucesso!");
            } catch (erroRender) { 
                console.error(erroRender);
                alert("O JSON foi carregado, mas houve um erro crítico de renderização de diagrama. Verifique o console."); 
            }
        };
        reader.readAsText(file);
    }

    // ==================== DIAGRAMA COM ÍCONES DENTRO DOS CÍRCULOS ====================
    function renderizarDiagrama() {
        if (!document.getElementById('network')) return;

        let elementosFiltrados = elementos;
        if (currentFilter !== 'all') {
            if (currentFilter === 'frontstage') elementosFiltrados = elementos.filter(e => e.camada === 'frontstage');
            else if (currentFilter === 'backstage') elementosFiltrados = elementos.filter(e => e.camada === 'backstage');
            else elementosFiltrados = elementos.filter(e => e.tipo === currentFilter);
        }

                const nodes = elementosFiltrados.map(el => {
            let bgColor = tipoCor[el.tipo] || '#8b5cf6';
            let borderColor = tipoBorda[el.tipo] || '#2d3748';
            let shape = 'icon';
            let iconCode = tipoIcone[el.tipo] || '❓';
            let nodeSize = 42; // Variável para controlar o tamanho dinamicamente
            
            // Lógica condicional atualizada para comportar tarefas e decisões
            if (el.tipo === 'tarefa') {
                shape = 'box';
                bgColor = '#f8fafc';
                borderColor = '#64748b';
            } else if (el.tipo === 'decisao') {
                shape = 'diamond';
                bgColor = '#fef08a';
                borderColor = '#ca8a04';
                nodeSize = 20; // Ajuste este valor (entre 18 e 25) para equiparar ao tamanho dos ícones
            }

            return {
                id: el.id,
                label: el.nome,
                camada: el.camada,
                title: `${el.nome}\n${el.competencia?.substring(0,80) || ''}`,
                color: { 
                    background: bgColor, 
                    border: borderColor, 
                    highlight: { background: bgColor, border: '#f59e0b' } 
                },
                shape: shape,
                icon: (shape === 'icon') ? {
                    face: 'Arial',
                    code: iconCode,
                    size: 28,
                    color: '#ffffff'
                } : undefined,
                size: nodeSize, // Substitui o valor fixo 42 pela variável dinâmica
                font: { size: 11, color: '#1a202c', face: 'Inter', background: 'rgba(255,255,255,0.7)' },
                borderWidth: 2,
                borderWidthSelected: 4,
                
            };
        });


        const edges = [];
        elementosFiltrados.forEach(el => {
            (el.relacionamentos || []).forEach(rel => {
                const targetExists = elementosFiltrados.some(e => e.id === rel.com);
                if (targetExists) {
                    let width = 1.0;
                    let dashes = false;
                    if (rel.tipo === 'Dependência' || rel.tipo === 'Regulamentação') { width = 0.8; dashes = true; }
                    if (rel.tipo === 'Fluxo de Valor (financeiro)') width = 1.2;
                    edges.push({ 
                        from: el.id, to: rel.com, relTipo: rel.tipo,
                        color: { color: relTipoCor[rel.tipo] || '#94a3b8' }, 
                        originalColor: relTipoCor[rel.tipo] || '#94a3b8', 
                        originalWidth: width,
                        arrows: 'to', width: width, dashes: dashes,
                        smooth: { type: 'continuous', roundness: 0 }
                    });
                }
            });
            (el.dependencias || []).forEach(depId => {
                const targetExists = elementosFiltrados.some(e => e.id === depId);
                if (targetExists) {
                    edges.push({ 
                        from: el.id, to: depId, relTipo: 'Dependência',
                        color: { color: '#ef4444' }, originalColor: '#ef4444', originalWidth: 0.8,
                        dashes: true, arrows: 'to', width: 0.8,
                        smooth: { type: 'continuous', roundness: 0 }
                    });
                }
            });
        });

        const container = document.getElementById('network');
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        if (network) network.destroy();

        const options = {
            nodes: { shape: 'icon', size: 40, font: { size: 11, color: '#1a202c' } },
            edges: {
                smooth: { type: 'continuous', roundness: 0 },
                font: { size: 0 },
                selectionWidth: 0,
                hoverWidth: 0,
                color: { inherit: false }
            },
            physics: {
                enabled: physicsEnabled,
                stabilization: { iterations: 150, fit: true },
                solver: 'forceAtlas2Based',
                forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 120, springConstant: 0.08 }
            },
            interaction: {
                hover: false,
                tooltipDelay: 100,
                navigationButtons: false,
                selectable: true,
                multiselect: false
            },
            layout: { randomSeed: 42 }
        };

        network = new vis.Network(container, data, options);
        
        if (window.savedPositions) {
            const posUpdates = [];
            Object.keys(window.savedPositions).forEach(id => {
                if (data.nodes.get(id)) {
                    posUpdates.push({
                        id: id,
                        x: window.savedPositions[id].x,
                        y: window.savedPositions[id].y
                    });
                }
            });
            if (posUpdates.length > 0) data.nodes.update(posUpdates);
            window.savedPositions = null;
            
            // CORREÇÃO: Desliga a física (gravidade) automaticamente ao importar posições
            physicsEnabled = false;
            network.setOptions({ physics: { enabled: false } });
            
            // Atualiza o botão na interface para mostrar que o diagrama está "Travado"
            const btnFisica = document.getElementById('togglePhysicsBtn');
            if(btnFisica) {
                btnFisica.innerHTML = '🌐 Liberar';
                btnFisica.style.background = '#f59e0b';
            }
        }

        // Botão para alternar física
        if (!window.physicsBtnListenerAdded) {
            const toggleBtn = document.getElementById('togglePhysicsBtn');
            const newToggleBtn = toggleBtn.cloneNode(true);
            toggleBtn.parentNode.replaceChild(newToggleBtn, toggleBtn);
            newToggleBtn.addEventListener('click', () => {
                physicsEnabled = !physicsEnabled;
                network.setOptions({ physics: { enabled: physicsEnabled } });
                if (physicsEnabled) {
                    newToggleBtn.innerHTML = '🔒 Travar';
                    newToggleBtn.style.background = '#10b981';
                    network.startSimulation();
                    setTimeout(() => network.stopSimulation(), 1000);
                } else {
                    newToggleBtn.innerHTML = '🌐 Liberar';
                    newToggleBtn.style.background = '#f59e0b';
                    network.stopSimulation();

        // Evento de clique
        network.on('click', (params) => {
            if (modoEdicaoRelacionamento) {
                if (params.nodes.length) {

                document.getElementById('network').style.cursor = 'default';

            const tituloEl = document.getElementById('diagramTitle');
            
            if (params.nodes.length) {

                currentSelectedId = id;

                if (elementoSelecionado) {
                    tituloEl.innerText = `🌐 DAE - ${elementoSelecionado.nome}`;
                } else if (network.isCluster(id)) {
                    tituloEl.innerText = `🌐 DAE - Camada Agrupada`;
                } else {
                    const nomeEcos = document.getElementById('nomeEcossistema').value.trim() || 'DAE';
                    tituloEl.innerText = `🌐 ${nomeEcos}`;
                }

                const textoIds = elementoSelecionado ? getConnectedIdsFromText(elementoSelecionado) : new Set();
                const allEdges = data.edges.get();
                allEdges.forEach(edge => {
                    const isConnected = (edge.from === id || edge.to === id) || textoIds.has(edge.from) || textoIds.has(edge.to);
                    const originalColor = edge.originalColor || edge.color;
                    data.edges.update({
                        id: edge.id,
                        width: isConnected ? 2.5 : (edge.dashes ? 0.8 : 1.0),
                        color: { color: originalColor, opacity: 1 }
                    });

                network.setSelection({ nodes: [id] }, { highlightEdges: false });

                const nomeEcos = document.getElementById('nomeEcossistema').value.trim() || 'DAE';

                currentSelectedId = null;
                
                const allEdges = data.edges.get();
                allEdges.forEach(edge => {
                    const originalColor = edge.originalColor || edge.color;
                    data.edges.update({
                        id: edge.id,
                        width: (edge.dashes ? 0.8 : (edge.originalWidth || 1.0)),
                        color: { color: originalColor, opacity: 1 }

                network.unselectAll();

                        joinCondition: function (nodeOptions) {

                        },
                        clusterNodeProperties: {
                            id: 'cluster_' + camadaStr,
                            borderWidth: 2,
                            shape: 'box',
                            mass: 1,
                            allowSingleNodeCluster: true,
                            label: `📦 Camada: ${camadaStr.toUpperCase()}`,
                            color: { background: '#f8fafc', border: '#8b5cf6' },
                            font: { size: 14, color: '#1e293b', face: 'Inter' }
                        }

                    network.cluster(clusterOptions);

                document.getElementById('btnAgruparCamada').style.display = 'none';

            document.getElementById('btnDesagrupar').addEventListener('click', () => {

                    }
                });
                document.getElementById('btnDesagrupar').style.display = 'none';
                document.getElementById('btnAgruparCamada').style.display = 'inline-block';

                if (network.isCluster(params.nodes[0])) {
                    network.openCluster(params.nodes[0]);
                    let temCluster = Object.keys(network.body.nodes).some(id => network.isCluster(id));
                    if(!temCluster) {
                        document.getElementById('btnDesagrupar').style.display = 'none';
                        document.getElementById('btnAgruparCamada').style.display = 'inline-block';
                    }

        });

        network.on('stabilized', () => { network.fit(); });

        // Legenda
        const legendDiv = document.getElementById('legend');
        if (legendDiv) {

                <div style="display:flex; flex-wrap:wrap; gap:1rem; justify-content:center; align-items:center;">
                    <span class="legend-filter-node" data-filter="ator" style="cursor:pointer; opacity:${getOp('ator')}; transition:0.2s;"><span style="font-size:1.1rem;">👤</span> Ator</span>
                    <span class="legend-filter-node" data-filter="servico" style="cursor:pointer; opacity:${getOp('servico')}; transition:0.2s;"><span style="font-size:1.1rem;">⚙️</span> Serviço</span>
                    <span class="legend-filter-node" data-filter="armazenamento" style="cursor:pointer; opacity:${getOp('armazenamento')}; transition:0.2s;"><span style="font-size:1.1rem;">🗄️</span> Armazenamento</span>
                    <span class="legend-filter-node" data-filter="touchpoint" style="cursor:pointer; opacity:${getOp('touchpoint')}; transition:0.2s;"><span style="font-size:1.1rem;">📱</span> Touchpoint</span>
                    <span class="legend-filter-node" data-filter="fator_externo" style="cursor:pointer; opacity:${getOp('fator_externo')}; transition:0.2s;"><span style="font-size:1.1rem;">🌍</span> Fator Externo</span>
                    <span class="legend-filter-node" data-filter="feedback_loop" style="cursor:pointer; opacity:${getOp('feedback_loop')}; transition:0.2s;"><span style="font-size:1.1rem;">🔄</span> Feedback</span>
                    <span class="legend-filter-node" data-filter="tarefa" style="cursor:pointer; opacity:${getOp('tarefa')}; transition:0.2s;"><span style="font-size:1.1rem;">✅</span> Tarefa</span>
                    <span class="legend-filter-node" data-filter="decisao" style="cursor:pointer; opacity:${getOp('decisao')}; transition:0.2s;"><span style="font-size:1.1rem;">🔀</span> Decisão</span>
                </div>
                <hr style="margin:8px 0; width:100%;">
                <div style="display:flex; flex-wrap:wrap; gap:0.8rem; justify-content:center;">
                    <span class="legend-filter-edge" data-rel="Dependência" style="cursor:pointer;"><span style="border:2px solid #ef4444; width:12px; height:2px; display:inline-block; vertical-align:middle; background:#ef4444;"></span> Dependência</span>
                    <span class="legend-filter-edge" data-rel="Fluxo de Valor (dados),Leitura,Gravação,Leitura+Gravação" style="cursor:pointer;"><span style="border:2px solid #14b8a6; width:12px; height:2px; display:inline-block; vertical-align:middle; background:#14b8a6;"></span> Fluxo de Dados</span>
                    <span class="legend-filter-edge" data-rel="Fluxo de Valor (financeiro)" style="cursor:pointer;"><span style="border:3px solid #f43f5e; width:12px; height:2px; display:inline-block; vertical-align:middle; background:#f43f5e;"></span> Fluxo Financeiro</span>
                    <span class="legend-filter-edge" data-rel="Feedback (melhoria)" style="cursor:pointer;"><span style="border:2px dashed #ec489a; width:12px; height:2px; display:inline-block; vertical-align:middle; background:#ec489a;"></span> Feedback</span>
                    <span class="legend-filter-edge" data-rel="Autenticação" style="cursor:pointer;"><span style="border:2px solid #c084fc; width:12px; height:2px; display:inline-block; vertical-align:middle; background:#c084fc;"></span> Autenticação</span>
                </div>
            `;

        // Eventos de filtro da legenda
        setTimeout(() => {
            document.querySelectorAll('.legend-filter-node').forEach(span => {

            document.querySelectorAll('.legend-filter-edge').forEach(span => {
                span.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tiposClicados = span.getAttribute('data-rel').split(',');

    // ==================== CONVERSÃO XMI (UML) ====================
    function daeToXMI(dados) {
        const { nome_ecossistema = "Ecossistema", elementos = [] } = dados;
        let nextId = 1;
        const getNewId = () => `_${nextId++}`;
        const elementMap = new Map();

        const camadas = { frontstage: [], backstage: [], none: [] };
        elementos.forEach(el => {
            elementMap.set(el.id, getNewId());
            const camada = el.camada || 'none';
            camadas[camada].push(el);
        });

        let rootPackageContent = '';
        for (const [camadaNome, elementosCamada] of Object.entries(camadas)) {
            if (elementosCamada.length === 0) continue;
            const pacoteId = getNewId();
            const pacoteNome = camadaNome === 'frontstage' ? 'Frontstage' : (camadaNome === 'backstage' ? 'Backstage' : 'Sem Camada');
            
            let camadaXML = `\n        <packagedElement xmi:type="uml:Package" xmi:id="${pacoteId}" name="${pacoteNome}">`;
            elementosCamada.forEach(el => {
                const classId = elementMap.get(el.id);
                camadaXML += `\n            <packagedElement xmi:type="uml:Class" xmi:id="${classId}" name="${escapeXml(el.nome)}" visibility="public">`;
                camadaXML += `\n                <ownedComment xmi:type="uml:Comment" xmi:id="${getNewId()}" body="Tipo: ${escapeXml(el.tipo)}"/>`;
                camadaXML += `\n                <ownedComment xmi:type="uml:Comment" xmi:id="${getNewId()}" body="Competências: ${escapeXml(el.competencia || '')}"/>`;
                camadaXML += `\n                <ownedComment xmi:type="uml:Comment" xmi:id="${getNewId()}" body="Valor Agregado: ${escapeXml(el.valor || '')}"/>`;
                camadaXML += `\n                <ownedComment xmi:type="uml:Comment" xmi:id="${getNewId()}" body="Fluxo de Informação: ${escapeXml(el.fluxo || '')}"/>`;
                camadaXML += `\n            </packagedElement>`;
            });
            camadaXML += `\n        </packagedElement>`;
            rootPackageContent += camadaXML;
        }

        elementos.forEach(el => {
            const sourceId = elementMap.get(el.id);
            if (!sourceId) return;
            (el.relacionamentos || []).forEach(rel => {
                const targetId = elementMap.get(rel.com);
                if (!targetId) return;
                const assocId = getNewId();
                const memberEnd1 = getNewId();
                const memberEnd2 = getNewId();
                rootPackageContent += `\n        <packagedElement xmi:type="uml:Association" xmi:id="${assocId}" name="${escapeXml(rel.tipo)}" visibility="public">`;
                rootPackageContent += `\n            <memberEnd xmi:idref="${memberEnd1}"/>`;
                rootPackageContent += `\n            <memberEnd xmi:idref="${memberEnd2}"/>`;
                rootPackageContent += `\n            <ownedEnd xmi:type="uml:Property" xmi:id="${memberEnd1}" type="${sourceId}" association="${assocId}"/>`;
                rootPackageContent += `\n            <ownedEnd xmi:type="uml:Property" xmi:id="${memberEnd2}" type="${targetId}" association="${assocId}" navigable="true"/>`;
                rootPackageContent += `\n        </packagedElement>`;
            });
            (el.dependencias || []).forEach(depId => {
                const targetId = elementMap.get(depId);
                if (!targetId) return;
                const depIdXmi = getNewId();
                rootPackageContent += `\n        <packagedElement xmi:type="uml:Dependency" xmi:id="${depIdXmi}" client="${sourceId}" supplier="${targetId}"/>`;
            });
        });

        const rootPackageId = getNewId();
        return `<?xml version="1.0" encoding="UTF-8"?>
<uml:Model xmi:version="20131001" xmlns:xmi="http://www.omg.org/spec/XMI/20131001" xmlns:uml="http://www.omg.org/spec/UML/20131001" xmi:id="_0" name="${escapeXml(nome_ecossistema)}">
    <packagedElement xmi:type="uml:Package" xmi:id="${rootPackageId}" name="${escapeXml(nome_ecossistema)}">${rootPackageContent}
    </packagedElement>
</uml:Model>`;
    }

    function escapeXml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[<>&'"]/g, (c) => {
            switch (c) { case '<': return '&lt;'; case '>': return '&gt;'; case '&': return '&amp;'; case '\'': return '&apos;'; case '"': return '&quot;'; default: return c; }
        });
    }

    function exportarXMI() {
        const nomeEcossistema = document.getElementById('nomeEcossistema').value.trim() || "Ecossistema";
        const dadosCompletos = { nome_ecossistema: nomeEcossistema, elementos: elementos };
        const xmiString = daeToXMI(dadosCompletos);
        const dataStr = "data:text/xml;charset=utf-8," + encodeURIComponent(xmiString);
        const a = document.createElement('a');
        a.href = dataStr;
        a.download = "ecossistema_uml.xmi";
        document.body.appendChild(a);
        a.click();
        a.remove();
    }

        const reader = new FileReader();

            console.log("XML Carregado:", xmlString);
        };
        reader.readAsText(file);
    };

    // ==================== EXPORTAÇÃO SWIMLANE (BPMN) REFATORADA ====================
    function exportarVisaoSwimlane() {
        if (!network || !network.body.data.nodes) {
            alert('Nenhum diagrama renderizado para exportar.');
            return;
        }
        
        const todosNos = network.body.data.nodes.get();
        const todasArestas = network.body.data.edges.get();

        if (todosNos.length === 0) {
            alert('O diagrama está vazio. Adicione elementos primeiro.');
            return;
        }

        const positions = network.getPositions();
        let nosComPosicao = todosNos.map(n => ({
            ...n,
            x: positions[n.id].x,
            y: positions[n.id].y,
            elemento: elementos.find(el => el.id === n.id) // Associa ao modelo completo
        })).filter(n => n.elemento); // Garante que temos o modelo

        // Separação Semântica: O que é Raia (Não-Tarefa) vs Tarefa
        const nosRaia = nosComPosicao.filter(n => n.elemento.tipo !== 'tarefa');
        const nosTarefa = nosComPosicao.filter(n => n.elemento.tipo === 'tarefa');

        // 1. Agrupa Raias por proximidade no eixo Y
        let raias = [];
        if (nosRaia.length > 0) {
            nosRaia.sort((a, b) => a.y - b.y);
            let raiaAtual = [nosRaia[0]];
            let yReferencia = nosRaia[0].y;
            
            for (let i = 1; i < nosRaia.length; i++) {
                const n = nosRaia[i];
                if (Math.abs(n.y - yReferencia) > 100) {
                    raias.push(raiaAtual);
                    raiaAtual = [];
                    yReferencia = n.y;
                }
                raiaAtual.push(n);
            }
            if (raiaAtual.length > 0) raias.push(raiaAtual);
        } else {
            // Caso não haja raias (só tarefas), cria uma raia padrão
            raias.push([{ id: 'default', label: 'Processo', x: 0, y: 0, elemento: { nome: 'Fluxo de Trabalho' } }]);
        }

        // 2. Aloca cada Tarefa à Raia mais próxima (ou pai se dependência)
        const tarefasPorRaia = Array(raias.length).fill().map(() => []);
        nosTarefa.forEach(tarefa => {
            let raiaIndex = 0;
            let minDist = Infinity;
            
            // Prioridade 1: Dependência explícita (se a tarefa depende de algum nó da raia)
            const dependencias = tarefa.elemento.dependencias || [];
            for (let i = 0; i < raias.length; i++) {
                const raia = raias[i];
                if (raia.some(n => dependencias.includes(n.id) || n.id === tarefa.elemento.id)) {
                    raiaIndex = i;
                    break;
                }
            }
            
            // Prioridade 2: Proximidade física (distância euclidiana)
            if (raiaIndex === 0 && minDist === Infinity) {
                raias.forEach((raia, idx) => {
                    raia.forEach(nRaia => {
                        const dist = Math.hypot(tarefa.x - nRaia.x, tarefa.y - nRaia.y);
                        if (dist < minDist) {
                            minDist = dist;
                            raiaIndex = idx;
                        }
                    });
                });
            }
            
            tarefasPorRaia[raiaIndex].push(tarefa);
        });

        // 3. Construção do HTML
        const paletaCores = ['#dbeafe', '#d1fae5', '#fef3c7', '#f3e8ff', '#f1f5f9', '#ffe4e6'];
        const bordaCores = ['#2563eb', '#059669', '#d97706', '#7c3aed', '#475569', '#e11d48'];
        
        let htmlLanes = '';
        let mapaCoordenadas = {};

        raias.forEach((raia, index) => {
            const corFundo = paletaCores[index % paletaCores.length];
            const corBorda = bordaCores[index % bordaCores.length];
            
            // Nome da Raia: Pega o primeiro elemento significativo (Ator, Serviço, etc.)
            const donoRaia = raia.find(n => n.elemento.tipo !== 'tarefa') || raia[0];
            const nomeRaia = donoRaia.elemento.nome || `Raia ${index + 1}`;

            let htmlTasks = '';
            const tarefas = tarefasPorRaia[index];
            tarefas.sort((a, b) => a.x - b.x); // Ordem de leitura (esquerda para direita)
            
            tarefas.forEach((tarefa, idx) => {
                // Calcula posição relativa dentro da raia
                const minX = Math.min(...raia.map(n => n.x));
                const maxX = Math.max(...raia.map(n => n.x));
                const rangeX = maxX - minX || 300;
                
                // Posição left baseada na coordenada X original
                let posLeft = ((tarefa.x - minX) / rangeX) * 600 + 20;
                if (posLeft < 20) posLeft = 20 + (idx * 150);
                
                mapaCoordenadas[tarefa.id] = {
                    cx: 170 + posLeft + 75, // Ajuste para o centro do retângulo
                    cy: (index * 130) + 65
                };

                htmlTasks += `
                    <div class="task" style="background: #ffffff; border: 2px solid ${corBorda}; left: ${posLeft}px; top: 35px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        <span style="font-weight:600;">✅</span> ${tarefa.elemento.nome}
                        <div style="font-size:0.7rem; color:#475569; margin-top:4px;">${tarefa.elemento.competencia?.substring(0,40) || ''}</div>
                    </div>
                `;
            });

            htmlLanes += `
            <div class="lane" style="border-left: 6px solid ${corBorda};">
                <div class="lane-header" style="background: ${corFundo};">${nomeRaia}</div>
                <div class="lane-content">
                    ${htmlTasks}
                </div>
            </div>
            `;
        });

        // 4. Desenho das Linhas (Fluxos entre Tarefas e/ou Recursos)
        let svgEdges = `
        <svg class="svg-overlay">
            <defs>
                <marker id="seta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
                </marker>
            </defs>`;
            
        todasArestas.forEach(aresta => {
            let origem = mapaCoordenadas[aresta.from];
            let destino = mapaCoordenadas[aresta.to];
            
            // Se não encontrou no mapa de tarefas, tenta buscar no mapa de raias
            if (!origem) {
                const noOrigem = nosRaia.find(n => n.id === aresta.from);
                if (noOrigem) origem = { cx: 100, cy: raias.findIndex(r => r.some(n => n.id === noOrigem.id)) * 130 + 65 };
            }
            if (!destino) {
                const noDestino = nosRaia.find(n => n.id === aresta.to);
                if (noDestino) destino = { cx: 800, cy: raias.findIndex(r => r.some(n => n.id === noDestino.id)) * 130 + 65 };
            }
            
            if (origem && destino) {
                let curvatura = (destino.cx - origem.cx) * 0.2;
                svgEdges += `
                    <path d="M ${origem.cx} ${origem.cy} C ${origem.cx + curvatura} ${origem.cy}, ${destino.cx - curvatura} ${destino.cy}, ${destino.cx} ${destino.cy}" 
                          stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#seta)" stroke-dasharray="${aresta.dashes ? '5,5' : 'none'}"/>
                `;
            }
        });
        svgEdges += `</svg>`;

        // 5. HTML Final
        const htmlBPMN = `
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
            <meta charset="UTF-8">
            <title>Visão Swimlane (BPMN) - ${document.getElementById('nomeEcossistema').value || 'DAE'}</title>
            <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; padding: 40px; margin: 0;}
                h1 { text-align: center; color: #334155; margin-bottom: 30px; }
                .diagram-wrapper { 
                    position: relative; 
                    display: flex; flex-direction: column; border: 2px solid #cbd5e1; 
                    background: white; min-width: 900px; border-radius: 12px; overflow: hidden;
                }
                .lane { 
                    display: flex; border-bottom: 1px solid #cbd5e1; 
                    min-height: 130px; box-sizing: border-box; position: relative; z-index: 2;
                }
                .lane:last-child { border-bottom: none; }
                .lane-header {
                    width: 150px; border-right: 2px solid #cbd5e1;
                    display: flex; align-items: center; justify-content: center;
                    text-align: center; font-weight: bold; font-size: 0.9rem;
                    padding: 15px; text-transform: uppercase; color: #1e293b;
                    flex-shrink: 0; box-sizing: border-box; z-index: 3;
                }
                .lane-content { 
                    flex-grow: 1; position: relative; box-sizing: border-box; min-height: 120px;
                }
                .task {
                    width: 160px; padding: 12px; border-radius: 12px; box-sizing: border-box;
                    font-size: 0.85rem; text-align: center;
                    box-shadow: 2px 4px 8px rgba(0,0,0,0.05); position: absolute;
                    font-weight: 500; color: #1e293b; z-index: 3; background: white;
                    transition: transform 0.1s ease;
                }
                .task:hover { transform: scale(1.02); box-shadow: 4px 8px 12px rgba(0,0,0,0.1); z-index: 10; }
                .svg-overlay {
                    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                    z-index: 1; pointer-events: none; 
                }
            </style>
        </head>
        <body>
            <h1>📋 Visão de Processos & Responsabilidades</h1>
            <div class="diagram-wrapper">
                ${svgEdges}
                ${htmlLanes}
            </div>
        </body>
        </html>
        `;

        const novaAba = window.open('', '_blank');
        novaAba.document.write(htmlBPMN);
        novaAba.document.close();
    }

    // ==================== INICIALIZAÇÃO ====================
    function init() {
        elementos = [
            { id: "gestor", nome: "Gestor", tipo: "ator", camada: "backstage", competencia: "Homologar matrizes", valor: "Garante qualidade estratégica", fluxo: "Acessa E-TIA → publica matriz na PEC", dependencias: [], relacionamentos: [{ com: "e-tia", tipo: "Autenticação" }] },
            { id: "professor", nome: "Professor", tipo: "ator", camada: "frontstage", competencia: "Gerar chaves G3", valor: "Media validação", fluxo: "P-TIA ↔ PEC e POC", dependencias: [], relacionamentos: [{ com: "p-tia", tipo: "Autenticação" }] },
            { id: "aluno", nome: "Aluno", tipo: "ator", camada: "frontstage", competencia: "Explorar trilhas", valor: "Protagonismo", fluxo: "T-TIA ↔ POC", dependencias: [], relacionamentos: [{ com: "t-tia", tipo: "Autenticação" }] },
            { id: "e-tia", nome: "E-TIA", tipo: "servico", camada: "backstage", competencia: "Design curricular", valor: "Engenharia curricular", fluxo: "← PEC → PEC", dependencias: ["pec"], relacionamentos: [{ com: "pec", tipo: "Gravação" }] },
            { id: "p-tia", nome: "P-TIA", tipo: "servico", camada: "frontstage", competencia: "Gestão de turmas", valor: "Central do professor", fluxo: "↔ PEC → POC", dependencias: ["pec","poc"], relacionamentos: [{ com: "pec", tipo: "Leitura+Gravação" }, { com: "poc", tipo: "Gravação" }] },
            { id: "t-tia", nome: "T-TIA", tipo: "servico", camada: "frontstage", competencia: "Trilha offline", valor: "Experiência imersiva", fluxo: "↔ POC", dependencias: ["poc"], relacionamentos: [{ com: "poc", tipo: "Leitura+Gravação" }] },
            { id: "pec", nome: "PEC", tipo: "armazenamento", camada: "backstage", competencia: "Matrizes JSON", valor: "Fonte única", fluxo: "Recebe dados do E-TIA e P-TIA", dependencias: [], relacionamentos: [] },
            { id: "poc", nome: "POC", tipo: "armazenamento", camada: "backstage", competencia: "Turmas, progresso", valor: "Gestão operacional", fluxo: "Recebe progresso do T-TIA", dependencias: [], relacionamentos: [] },
            { id: "app_aluno", nome: "App Aluno", tipo: "touchpoint", camada: "frontstage", competencia: "Interface mobile", valor: "Acesso fácil", fluxo: "Conecta aluno ao T-TIA", dependencias: ["t-tia"], relacionamentos: [{ com: "t-tia", tipo: "Interação direta" }] },
            { id: "mec", nome: "Regulamentação MEC", tipo: "fator_externo", camada: "none", competencia: "Diretrizes nacionais", valor: "Conformidade legal", fluxo: "Influencia E-TIA", dependencias: [], relacionamentos: [{ com: "e-tia", tipo: "Regulamentação" }] },
            { id: "feedback_imo", nome: "Melhoria Contínua IMO", tipo: "feedback_loop", camada: "backstage", competencia: "Ajuste do IMO", valor: "Evolução curricular", fluxo: "POC → Pedagogo → E-TIA → PEC", dependencias: ["poc","e-tia"], relacionamentos: [{ com: "e-tia", tipo: "Feedback (melhoria)" }] },
            // Novas Tarefas de Exemplo
            { id: "tarefa_criar_matriz", nome: "Criar Matriz Curricular", tipo: "tarefa", camada: "backstage", competencia: "Estruturar competências e habilidades", valor: "Base para o ano letivo", fluxo: "", dependencias: ["e-tia"], relacionamentos: [{ com: "pec", tipo: "Gravação" }] },
            { id: "tarefa_gerar_chave", nome: "Gerar Chave de Turma", tipo: "tarefa", camada: "frontstage", competencia: "Ativar turma no sistema", valor: "Acesso dos alunos", fluxo: "", dependencias: ["p-tia"], relacionamentos: [{ com: "poc", tipo: "Gravação" }] },
            { id: "tarefa_realizar_atividade", nome: "Realizar Atividade Offline", tipo: "tarefa", camada: "frontstage", competencia: "Resolver questões no app", valor: "Progresso do aluno", fluxo: "", dependencias: ["t-tia"], relacionamentos: [{ com: "poc", tipo: "Gravação" }] }
        ];
        document.getElementById('nomeEcossistema').value = "Ecossistema ASTIA - Educação 4.0";
        atualizarListaElementos();
        gerarJSONPreview();
        renderizarDiagrama();
        if (elementos.length) mostrarDetalhes(elementos[0].id);
        setActiveTab('editor');
        preencherTemplate();
    }

    // ==================== ABAS E EVENT LISTENERS ====================
    const tabEditor = document.getElementById('tabEditorBtn');
    const tabVisualizacao = document.getElementById('tabVisualizacaoBtn');
    const editorPanel = document.getElementById('editorPanel');
    const visualizacaoPanel = document.getElementById('visualizacaoPanel');
    function setActiveTab(tab) {
        tabEditor.classList.remove('active'); tabVisualizacao.classList.remove('active');
        editorPanel.classList.remove('active'); visualizacaoPanel.classList.remove('active');
        if (tab === 'editor') { tabEditor.classList.add('active'); editorPanel.classList.add('active'); }
        else { tabVisualizacao.classList.add('active'); visualizacaoPanel.classList.add('active');
            if (currentSelectedId) mostrarDetalhes(currentSelectedId);
            else if (elementos.length) mostrarDetalhes(elementos[0].id);
        }
    }
    tabEditor.addEventListener('click', () => setActiveTab('editor'));
    tabVisualizacao.addEventListener('click', () => setActiveTab('visualizacao'));

    document.getElementById('addRelBtn').addEventListener('click', () => {
        const destino = document.getElementById('relDestino').value.trim();
        const tipo = document.getElementById('relTipo').value;
        if (!destino) return;
        relacoesTemp.push({ com: destino, tipo });
        atualizarListaRelacoes();
        document.getElementById('relDestino').value = '';
    });
	document.getElementById('gerarBpmnBtn').addEventListener('click', exportarVisaoSwimlane);
    document.getElementById('saveElemBtn').addEventListener('click', salvarElemento);
    document.getElementById('cancelEditBtn').addEventListener('click', limparFormulario);
    document.getElementById('exportJsonBtn').addEventListener('click', exportarJSON);
    document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('exportXmlBtn').addEventListener('click', exportarXMI);
    document.getElementById('importXmlBtn').addEventListener('click', () => document.getElementById('importXmlFile').click());
    document.getElementById('importXmlFile').addEventListener('change', (e) => { 
        if (e.target.files.length) importarXMI(e.target.files[0]); 
        e.target.value = ''; 
    });
    document.getElementById('importFile').addEventListener('change', (e) => { if (e.target.files.length) importarJSON(e.target.files[0]); e.target.value = ''; });
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => aplicarFiltro(btn.getAttribute('data-filter')));
    });
    document.getElementById('elemTipo').addEventListener('change', preencherTemplate);
    window.addEventListener('resize', () => { if (network) network.redraw(); });
    
    document.getElementById('ativarModoCliqueBtn').addEventListener('click', () => {
        modoEdicaoRelacionamento = true;
        alert('Clique em um nó no diagrama para definir o destino do relacionamento.');
        document.getElementById('network').style.cursor = 'crosshair';
    });

    init();
</script>
